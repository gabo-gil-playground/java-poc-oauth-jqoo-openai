spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL # Emulate Postgres syntax
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always # Automatically run schema.sql if you have it
  # jOOQ Specific: Ensure it switches dialect to H2
  jooq:
    sql-dialect: h2
  ai:
    openai:
      api-key: "fake-key-for-testing"
      chat:
        enabled: true